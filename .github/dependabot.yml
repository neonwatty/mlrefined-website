version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: eslint
        versions:
          - ">=10"
    groups:
      safe-updates:
        update-types:
          - patch
          - minor
        exclude-patterns:
          - next

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - ci
    groups:
      actions:
        patterns:
          - "*"
