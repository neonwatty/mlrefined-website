    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current Next.js app, approved HTML mockup, asset sources, routes, verification commands, and migration risks before any implementation."
    inputs:
      - "AGENTS.md"
      - "README.md"
      - "package.json"
      - "node_modules/next/dist/docs/"
      - "docs/landing-reimagining/unified-html-mockup/"
      - "app/"
      - "src/"
      - "public/"
      - "External asset facts already named by the user: neonwatty/machine-learning-refined and neonwatty/machine-learning-refined-notes-assets"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not generate images."
      - "Do not add stock imagery."
      - "Prefer concrete file-path evidence over generic recommendations."
      - "Record whether external asset repos are already local or need fetching during a later Worker task."
    expected_output:
      - "Current app route/component map."
      - "Approved mockup section inventory and route mapping."
      - "Real asset inventory and missing asset questions."
      - "Next.js docs/conventions that affect implementation."
      - "Verification command list."
      - "Top risks and first recommended Worker slice."
    receipt:
      result: done
      note: "notes/T001-scout-map.md"
      summary: "Mapped the current Next.js app, approved mockup inventory, production/mockup asset gap, relevant local Next docs, verification commands, risks, and recommended a shared content/asset foundation as the first Worker slice."
      evidence:
        - "src/app/layout.tsx"
        - "src/app/page.tsx"
        - "src/app/chapters/page.tsx"
        - "src/app/resources/page.tsx"
        - "src/lib/site.ts"
        - "src/content/"
        - "public/"
        - "docs/landing-reimagining/unified-html-mockup/README.md"
        - "docs/landing-reimagining/unified-html-mockup/app.js"
        - "node_modules/next/dist/docs/01-app/01-getting-started/02-project-structure.md"
        - "node_modules/next/dist/docs/01-app/01-getting-started/05-server-and-client-components.md"
        - "node_modules/next/dist/docs/01-app/01-getting-started/12-images.md"
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review T001 findings and choose the first implementation slice by impact, reversibility, and verification strength."
    inputs:
      - "T001 receipt or note."
      - "Goal oracle."
      - "Existing plan facts."
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Choose the largest safe useful first slice, not a tiny setup task unless setup truly blocks implementation."
      - "Require allowed_files, verify commands, and stop conditions for the Worker."
    expected_output:
      - "Decision: approved first slice or request more Scout evidence."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "Deferred or blocked tasks."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "The largest safe useful first slice is the shared content and asset foundation. It is required before the landing, chapters, notebooks, instructors, and reviews pages can be implemented from reusable source-backed data, and it directly addresses the current production gaps in chapter coverage, static figures, nav/routes, reviews, and roadmap data."
      worker_task: T010
      allowed_files:
        - "src/lib/site.ts"
        - "src/content/**"
        - "public/learning-visuals/book-figures/**"
        - "docs/goals/mockup-to-next-site/**"
      verify:
        - "git diff --check"
        - "npm run lint"
        - "npm run typecheck"
        - "npm run test:unit"
      stop_if:
        - "Need app route/component edits outside the content/asset foundation."
        - "Need to fetch external repositories or copy files from outside the approved existing mockup/book asset sources."
        - "A source-backed claim, review excerpt, figure path, or external link cannot be verified."
        - "Verification fails twice for the same reason."
      deferred_tasks:
        - T020
        - T030
        - T040
        - T050
        - T060
        - T070
        - T080
        - T090

