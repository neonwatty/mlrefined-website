version: 2

goal:
  title: "Mockup To Next Site"
  slug: "mockup-to-next-site"
  kind: existing_plan
  tranche: "Implement the approved unified HTML mockup direction as the real Next.js website through successive verified vertical slices."
  status: done
  oracle:
    signal: "A desktop and mobile browser walkthrough of the real Next.js app proves the landing, chapters, notebooks, instructors, and reviews paths work with real assets, stable imagery, accessible navigation, and no console/image-load regressions, while npm run ci passes."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge/PM receipt maps implemented routes/components/assets/tests/browser screenshots to the approved mockup direction and records full_outcome_complete: true."
  intake:
    original_request: "Create a detailed GoalBuddy prep board for translating the unified HTML mockup into the actual Next.js app routes/components."
    interpreted_outcome: "A GoalBuddy board guides the conversion of the approved HTML mockup into the production Next.js MLR site."
    input_shape: existing_plan
    audience: "Prospective readers, instructors, current adopters, and the site owner."
    authority: approved
    proof_type: demo
    completion_proof: "The real Next.js app implements the approved mockup funnel with real assets, passes repo checks, and has browser evidence across desktop and mobile."
    likely_misfire: "Copying mockup visuals into Next.js without real app structure, stable assets, responsive proof, SEO/accessibility, analytics readiness, or browser verification."
    blind_spots_considered:
      - "Mockup-only styling may not map cleanly to the current Next.js architecture."
      - "Image paths may break when moved from docs mockup to app routes."
      - "Carousel and image containers can regress into jitter, blinking, or layout shift."
      - "Mobile layouts may fail despite desktop looking good."
      - "Book claims, reviews, logos, and figure captions need source-backed content."
      - "SEO metadata, crawlable links, and analytics readiness can be missed during visual migration."
    existing_plan_facts:
      - "Use the unified HTML mockup as the approved product and visual reference."
      - "Preserve the simplified landing funnel."
      - "Keep gallery imagery folded into the landing carousel rather than a separate gallery page."
      - "Include chapters, notebooks, instructors, and reviews as first-class experiences."
      - "Use real book/source assets and notes-assets figures."
      - "Do not generate new images or add stock imagery."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/mockup-to-next-site/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal /Users/neonwatty/Desktop/mlrefined-website/.worktrees/main-maintenance/docs/goals/mockup-to-next-site"

active_task: null

tasks:
